<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage AI</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9fafc; /* Luxury feel */
            color: #333;
        }

        header {
            background: #0d47a1; /* Deep blue, luxury */
            color: white;
            padding: 10px;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        form {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, textarea {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            background: #00bfa5; /* Complementary luxury accent */
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #00796b;
        }

        @media (max-width: 600px) {
            header {
                font-size: 18px;
            }

            .container {
                padding: 10px;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Ashton Epps Mortgage AI</h1>
        <p>Your luxury destination for modern mortgage solutions</p>
    </header>

    <div class="container">
        <h2>Ask AI Your Mortgage Questions</h2>
        <p>Have a question about mortgages? Submit your inquiry below, and our AI will handle the rest!</p>

        <form action="https://formsubmit.co/epps.ashton@gmail.com" method="POST">
            <!-- FormSubmit hidden fields -->
            <input type="hidden" name="_template" value="table">
            
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="Full Name" placeholder="Enter your full name" required>
            
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="Phone Number" placeholder="Enter your phone number" required>
            
            <label for="email">Email Address</label>
            <input type="email" id="email" name="Email Address" placeholder="Enter your email address" required>
            
            <label for="question">Your Question</label>
            <textarea id="question" name="Question" rows="5" placeholder="What do you want to know about mortgages?" required></textarea>
            
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
