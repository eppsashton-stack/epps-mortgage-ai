<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage AI</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9fafc; /* Luxury feel */
            color: #333;
        }

        header {
            background: #0d47a1; /* Deep blue, luxury */
            color: white;
            padding: 10px;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        textarea {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            background: #00bfa5;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #00796b;
        }

        @media (max-width: 600px) {
            header {
                font-size: 18px;
            }

            .container {
                padding: 10px;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Ashton Epps Mortgage AI</h1>
        <p>Your luxury destination for modern mortgage solutions</p>
    </header>

    <div class="container">
        <h2>Ask AI Your Mortgage Questions</h2>
        <textarea id="ai-question" rows="4" placeholder="Type your mortgage question here..."></textarea>
        <button id="ask-ai-button">Get Answer</button>
        <p id="ai-answer" style="margin-top: 15px; color: #555;">Your answer will appear here.</p>
    </div>

    <div class="container">
        <h2>Request a Callback</h2>
        <form action="https://formsubmit.co/epps.ashton@gmail.com" method="POST">
            <input type="hidden" name="_template" value="table">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="Full Name" placeholder="Enter your full name">

            <label for="email">Email Address</label>
            <input type="email" id="email" name="Email Address" placeholder="Enter your email address">

            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="Phone Number" placeholder="Enter your phone number">

            <button type="submit">Submit</button>
        </form>
    </div>

    <script>
        document.getElementById("ask-ai-button").addEventListener("click", function() {
            const question = document.getElementById("ai-question").value;
            const answerElement = document.getElementById("ai-answer");
            if (question.trim()) {
                answerElement.textContent = `AI is thinking... (this is where the answer to '${question}' will appear)`;
            } else {
                answerElement.textContent = "Please type a question.";
            }
        });
    </script>
</body>
</html>
